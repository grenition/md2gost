x-infra-env: &infra-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: ${DATABASE_URL:-postgresql://md2gost:md2gost@postgres:5432/md2gost}
  SESSION_STORE_BACKEND: ${SESSION_STORE_BACKEND:-postgres}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-md2gost-sessions}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_USE_SSL: ${S3_USE_SSL:-0}

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: md2gost-gateway
    ports:
      - "${GATEWAY_PORT:-80}:80"
    depends_on:
      - frontend
      - api-service
      - session-service
    restart: unless-stopped
    networks:
      - md2gost-network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: md2gost-frontend
    expose:
      - "3000"
    environment:
      <<: *infra-env
    restart: unless-stopped
    networks:
      - md2gost-network

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: md2gost-api-service
    expose:
      - "5001"
    depends_on:
      - docx-service
      - file-service
      - session-service
    environment:
      <<: *infra-env
      DOCX_SERVICE_URL: ${DOCX_SERVICE_URL:-http://docx-service:5000}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL:-http://file-service:5002}
      SESSION_SERVICE_URL: ${SESSION_SERVICE_URL:-http://session-service:5003}
    restart: unless-stopped
    networks:
      - md2gost-network

  session-service:
    build:
      context: ./services/session-service
      dockerfile: Dockerfile
    container_name: md2gost-session-service
    expose:
      - "5003"
    environment:
      <<: *infra-env
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - md2gost-network

  docx-service:
    build:
      context: .
      dockerfile: ./services/docx-service/Dockerfile
    container_name: md2gost-docx-service
    expose:
      - "5000"
    environment:
      <<: *infra-env
      TEMPLATE_PATH: ${TEMPLATE_PATH:-/app/md2gost/Template.docx}
      WORKING_DIR: ${WORKING_DIR:-/tmp/md2gost}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL:-http://file-service:5002}
    depends_on:
      - file-service
    restart: unless-stopped
    networks:
      - md2gost-network

  file-service:
    build:
      context: ./services/file-service
      dockerfile: Dockerfile
    container_name: md2gost-file-service
    expose:
      - "5002"
    environment:
      <<: *infra-env
      STORAGE_BASE: ${SESSIONS_STORAGE_BASE:-/tmp/md2gost/sessions}
    depends_on:
      - minio
    restart: unless-stopped
    networks:
      - md2gost-network

  postgres:
    image: postgres:16-alpine
    container_name: md2gost-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-md2gost}
      POSTGRES_USER: ${POSTGRES_USER:-md2gost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-md2gost}
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - md2gost-network

  minio:
    image: minio/minio:latest
    container_name: md2gost-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    restart: unless-stopped
    volumes:
      - minio-data:/data
    networks:
      - md2gost-network

networks:
  md2gost-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
